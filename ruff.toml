[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "NPY",    # numpy-specific rules
]
ignore = [
    "E501",   # line too long (let formatter handle this)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__.py are often intentional

[lint.isort]
known-first-party = ["models", "utils", "dataset", "metrics"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
