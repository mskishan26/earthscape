# ============================================================================
# Experiment: ConvNeXt-Tiny Dual-Backbone Gated Mid-Fusion — All spectral + topo
# ============================================================================
# Usage: python train.py --experiment experiments/convnext_fusion_gated.yaml

name: convnext_fusion_gated
description: "ConvNeXt-Tiny dual-backbone with SE-style gated mid-fusion"

model:
  architecture: convnext_fusion_gated
  dropout: 0.3
  drop_path_rate: 0.4

features:
  spectral_modalities: ["aerialr", "aerialg", "aerialb", "aerialnir"]
  topo_modalities: ["dem", "ep_51x51", "slope_50", "procurv_50", "plancurv_50", "stdslope_51x51", "nhd"]
  mode: full
