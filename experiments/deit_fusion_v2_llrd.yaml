# ============================================================================
# Experiment: DeiT3-Small Late Fusion V2 + LLRD
# ============================================================================
# Usage: python train.py --experiment experiments/deit_fusion_v2_llrd.yaml
#
# Simplified classifier head (single linear + 0.001 init) PLUS layer-wise
# learning rate decay (LLRD) with decay=0.75.
#
# LLRD schedule (DeiT-Small has 12 blocks):
#   patch_embed:  lr * 0.75^13 ≈ lr * 0.024
#   block 0:      lr * 0.75^12 ≈ lr * 0.032
#   block 11:     lr * 0.75^1  = lr * 0.75
#   classifier:   lr * 1.0
#
# This preserves pretrained low-level features while allowing the head
# and late blocks to adapt freely to the geological domain.

name: deit_fusion_v2_llrd
description: "DeiT3-Small late fusion with simplified head + LLRD (decay=0.75)"

model:
  architecture: deit_fusion
  dropout: 0.3
  llrd_decay: 0.75

features:
  spectral_modalities: ["aerialr", "aerialg", "aerialb", "aerialnir"]
  topo_modalities: ["dem", "ep_51x51", "slope_50", "procurv_50", "plancurv_50", "stdslope_51x51", "nhd"]
  mode: full
