# ============================================================================
# Experiment: ConvNeXt-Tiny Dual-Backbone Mid-Fusion — All spectral + topo
# ============================================================================
# Usage: python train.py --experiment experiments/convnext_fusion.yaml

name: convnext_fusion
description: "ConvNeXt-Tiny dual-backbone mid-fusion with all spectral + topo features"

model:
  architecture: convnext_fusion
  dropout: 0.3
  drop_path_rate: 0.4

features:
  spectral_modalities: ["aerialr", "aerialg", "aerialb", "aerialnir"]
  topo_modalities: ["dem", "ep_51x51", "slope_50", "procurv_50", "plancurv_50", "stdslope_51x51", "nhd"]
  mode: full
